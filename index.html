<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>棱镜--智慧校园高精度室内导航</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mobile.css" media="screen and (max-width: 768px)">
</head>
<body>
    <div id="splash-screen" class="splash-screen">
        <div class="splash-content">
            <h1>🏫 棱镜--智慧校园高精度室内导航</h1>
            <p>高精度室内导航 · 课表联动</p>
            <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>
    </div>

    <div id="guide-modal" class="guide-modal" style="display: none;">
        <div class="guide-card">
            <h3>👋 欢迎使用室内导航</h3>
            <div class="guide-step"><span>1️⃣</span> 点击下方导入课表，粘贴课程信息</div>
            <div class="guide-step"><span>2️⃣</span> 点击课程旁的「导航」按钮</div>
            <div class="guide-step"><span>3️⃣</span> 切换楼层 / 2D-3D 视角</div>
            <button id="close-guide" class="btn-primary">开始探索</button>
        </div>
    </div>

    <div class="app-container">
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h2>📋 我的课表</h2>
                <button id="import-schedule-btn" class="icon-btn" title="导入课表">📤</button>
            </div>
            
            <div id="today-schedule" class="schedule-list">
                <div class="empty-state">暂无课程，点击右上角导入</div>
            </div>

            <div class="filter-section">
                <h3>🔍 快速筛选</h3>
                <div class="filter-tags" id="poi-filter">
                    <button data-type="多媒体教室" class="filter-tag active">🏛️ 教室</button>
                    <button data-type="办公室" class="filter-tag active">💼 办公室</button>
                    <button data-type="卫生间" class="filter-tag active">🚻 卫生间</button>
                    <button data-type="饮水机" class="filter-tag active">💧 饮水机</button>
                    <button data-type="打印机" class="filter-tag active">🖨️ 打印机</button>
                    <button data-type="楼梯间" class="filter-tag active">🪜 楼梯</button>
                    <button data-type="功能性公用自习室" class="filter-tag active">📚 自习室</button>
                    <button data-type="仓库" class="filter-tag active">📦 仓库</button>
                </div>
            </div>

            <div class="search-section">
                <input type="text" id="search-input" placeholder="搜索房间号/名称 (如 101, 多媒体)" />
                <div id="search-results" class="search-results"></div>
            </div>

            <div class="route-preference">
                <label><input type="radio" name="route-type" value="shortest" checked> 最短路径</label>
                <label><input type="radio" name="route-type" value="stairs"> 优先楼梯</label>
            </div>

            <div class="point-picker">
                <div class="picker-row">
                    <button id="pick-start-btn" class="picker-btn start-btn">📍当前定位</button>
                    <span id="start-point-label" class="point-label">未选择</span>
                </div>
                <div class="picker-row">
                    <button id="pick-end-btn" class="picker-btn end-btn">🏁 选择终点</button>
                    <span id="end-point-label" class="point-label">未选择</span>
                </div>
                <button id="start-navigation-btn" class="nav-start-btn" disabled>🚀 开始导航</button>
                <button id="clear-points-btn" style="margin-top:8px; padding:8px 16px; border-radius:30px; border:none; background:#e2e8f0; font-size:0.9rem; cursor:pointer;">🗑️ 清除选点</button>
            </div>
        </aside>

        <main id="map-container" class="map-container">
            <div class="map-controls">
                <div class="floor-switcher">
                    <button data-floor="1" class="floor-btn active">1F</button>
                    <button data-floor="2" class="floor-btn">2F</button>
                </div> <div class="absolute top-20 right-4 z-[1000] flex flex-col gap-2">
                    <button onclick="toggle3D()" id="btn-3d" 
                            class="w-10 h-10 bg-white rounded-lg shadow-md border flex items-center justify-center text-primary hover:bg-slate-50 transition-all" 
                            title="切换 2D/3D 视角">
                        <span class="material-symbols-outlined">layers</span>
                    </button>
                </div>
            </div> <div id="map" class="map"></div>
        </main>

        <div id="import-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <h3>📥 导入课表</h3>
                <p>粘贴课程文本(包含教室号如 1栋1楼101)</p>
                <textarea id="schedule-text" rows="6" placeholder="例：周一 8:00-9:40 高等数学 1栋1楼103"></textarea>
                <div class="modal-actions">
                    <button id="parse-schedule-btn" class="btn-primary">解析并导入</button>
                    <button id="cancel-import" class="btn-secondary">取消</button>
                </div>
                <p class="hint">支持 .txt 或粘贴，系统自动提取教室号</p>
            </div>
        </div><!-- 房间列表弹窗（用于筛选标签） -->
<div id="room-list-modal" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 400px; max-height: 70vh; overflow-y: auto;">
        <h3 id="room-list-title">房间列表</h3>
        <div id="room-list-container" class="room-list-container"></div>
        <div class="modal-actions">
            <button id="close-room-list" class="btn-secondary">关闭</button>
        </div>
    </div>
</div>

        <div id="route-panel" class="route-panel" style="display: none;">
            <div class="route-header">
                <span>🚶 导航路线</span>
                <button id="close-route" class="close-btn">✕</button>
            </div>
            <div id="route-info" class="route-info"></div>
        </div>

        <div class="reminder-settings">
            <button id="reminder-btn" class="reminder-btn">⏰ 提醒设置</button>
            <div id="reminder-dropdown" class="reminder-dropdown" style="display: none;">
                <label>课前提醒：</label>
                <select id="reminder-time-select">
                    <option value="5">5分钟</option>
                    <option value="10">10分钟</option>
                    <option value="15" selected>15分钟</option>
                </select>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="data/HD_1F2F.js"></script>
    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/parser.js"></script>
    <script src="js/notification.js"></script> 
    <script src="js/routing.js"></script>
    <script src="js/mapEngine.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
